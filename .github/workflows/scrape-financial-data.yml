name: "📰 Automated Financial Data Scraper"

on:
  schedule:
    # 9:00 AM IST (UTC+5:30) = 3:30 UTC
    - cron: "30 3 * * *"
    # 4:00 PM IST (UTC+5:30) = 10:30 UTC
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/sentiment-service/training/scraper_requirements.txt"

      # ── 3. Install dependencies ────────────────────────────────────────────
      #   • Pre-upgrade numpy & pandas first to avoid version conflicts on
      #     ubuntu-latest which ships older system builds.
      #   • Then install the rest from requirements to keep everything pinned.
      - name: "📦 Install dependencies"
        working-directory: backend/sentiment-service/training
        run: |
          pip install --upgrade pip
          pip install --upgrade numpy pandas
          pip install -r scraper_requirements.txt

      # ── 4. Show run time in IST ────────────────────────────────────────────
      #   Useful for debugging schedule drift or timezone issues in logs.
      - name: "🕒 Display current time (UTC + IST)"
        run: |
          echo "UTC time : $(date)"
          echo "IST time : $(TZ='Asia/Kolkata' date)"

      # ── 5. Ensure output directory exists ─────────────────────────────────
      #   Guards against a crash when the datausing/ folder is not yet
      #   committed to the repo (first run or clean checkout).
      - name: "📁 Ensure datausing directory exists"
        working-directory: backend/sentiment-service/training
        run: mkdir -p datausing

      # ── 6. Run the scraper ─────────────────────────────────────────────────
      - name: "🚀 Run scraper"
        working-directory: backend/sentiment-service/training
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scrape_indian_dataset.py

      # ── 7. Show dataset statistics ─────────────────────────────────────────
      #   Prints file size, row count and sentiment breakdown to the Actions
      #   log so you can immediately spot if a run collected 0 articles or if
      #   the sentiment distribution looks off — without having to pull the CSV.
      - name: "📊 Show dataset statistics"
        working-directory: backend/sentiment-service/training
        run: |
          echo "========================================"
          echo "=== File Info ==="
          ls -lh datausing/final_labeled_project_data.csv
          echo ""
          echo "=== Row Count ==="
          wc -l datausing/final_labeled_project_data.csv
          echo ""
          echo "=== Dataset Summary ==="
          python -c "
          import pandas as pd
          df = pd.read_csv('datausing/final_labeled_project_data.csv')
          print(f'Total articles : {len(df)}')
          print(f'News articles  : {len(df[df[\"source_type\"] == \"news\"])}')
          print(f'Social posts   : {len(df[df[\"source_type\"] == \"social\"])}')
          print()
          print('Sentiment distribution:')
          print(df['auto_sentiment'].value_counts().to_string())
          "
          echo "========================================"

      # ── 8. Commit & push updated files ────────────────────────────────────
      #   Commits both the main dataset CSV and the feed health log (if it
      #   exists).  The  || true  on the health log means a missing file will
      #   never break the workflow.
      - name: "💾 Commit and push updated dataset"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          git add backend/sentiment-service/training/datausing/final_labeled_project_data.csv
          git add backend/sentiment-service/training/feed_health_log.csv || true

          if git diff --staged --quiet; then
            echo "✅ No new data to commit — dataset already up to date."
          else
            TIMESTAMP=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %I:%M %p IST')
            git commit -m "📰 Auto-scraped financial data - ${TIMESTAMP}"
            git push
            echo "✅ New data committed and pushed successfully!"
          fi

      # ── 9. Upload dataset as artifact ──────────────────────────────────────
      #   Keeps a 90-day snapshot of every run.  Acts as a safety net if the
      #   CSV in the repo is ever corrupted or accidentally overwritten, and
      #   lets you compare dataset growth run-by-run without git checkout.
      - name: "📤 Upload dataset as artifact"
        uses: actions/upload-artifact@v4
        with:
          name: financial-dataset-${{ github.run_number }}
          path: backend/sentiment-service/training/datausing/final_labeled_project_data.csv
          retention-days: 90
          if-no-files-found: ignore
