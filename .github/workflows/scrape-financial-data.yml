name: "\U0001F4F0 Automated Financial Data Scraper"

on:
  schedule:
    # 9:00 AM IST (UTC+5:30) = 3:30 UTC
    - cron: '30 3 * * *'
    # 4:00 PM IST (UTC+5:30) = 10:30 UTC
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: "\U0001F4E5 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "\U0001F40D Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/sentiment-service/training/scraper_requirements.txt'

      - name: "\U0001F4E6 Install dependencies"
        run: |
          pip install --upgrade numpy pandas
          pip install -r scraper_requirements.txt
        working-directory: backend/sentiment-service/training

      - name: "\U0001F552 Display current time in IST"
        run: |
          echo "UTC time: $(date)"
          echo "IST time: $(TZ='Asia/Kolkata' date)"

      - name: "\U0001F680 Run the scraper"
        run: python scrape_indian_dataset.py
        working-directory: backend/sentiment-service/training
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: "\U0001F4CA Show dataset statistics"
        working-directory: backend/sentiment-service/training
        run: |
          echo "=== File Info ==="
          ls -la datausing/final_labeled_project_data.csv
          echo ""
          echo "=== Row Count ==="
          wc -l datausing/final_labeled_project_data.csv
          echo ""
          echo "=== Dataset Summary ==="
          python -c "
          import pandas as pd
          df = pd.read_csv('datausing/final_labeled_project_data.csv')
          print(f'Total articles: {len(df)}')
          print(df['auto_sentiment'].value_counts())
          "

      - name: "\U0001F4BE Commit and push updated CSV"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add backend/sentiment-service/training/datausing/final_labeled_project_data.csv
          if git diff --staged --quiet; then
            echo "✅ No new data to commit"
          else
            TIMESTAMP=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %I:%M %p IST')
            git commit -m "📰 Auto-scraped financial data - ${TIMESTAMP}"
            git push
            echo "✅ New data committed and pushed!"
          fi

      - name: "\U0001F4E4 Upload dataset as artifact"
        uses: actions/upload-artifact@v4
        with:
          name: financial-dataset-${{ github.run_number }}
          path: backend/sentiment-service/training/datausing/final_labeled_project_data.csv
          retention-days: 90
          if-no-files-found: ignore
